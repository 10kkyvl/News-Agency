{% extends 'base.html' %}

{% block title %}Confirm Deletion - NewsPortal{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
    <h2 class="text-2xl font-semibold text-center text-gray-800 mb-6">
      Confirm Deletion
    </h2>
    <p class="text-gray-700 mb-6 text-center">
      Are you sure you want to delete the article: "{{ object.title }}"?
    </p>
    <form method="POST" class="space-y-6">
      {% csrf_token %}
      <div class="flex space-x-4">
        <a href="{% url 'agency:newspaper-list' %}"
           class="w-full bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 cursor-pointer text-center">
          Cancel
        </a>
        <button type="submit"
                class="w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 cursor-pointer">
          Delete
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
