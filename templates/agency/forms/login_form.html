{% extends 'base.html' %}

{% block title %}Editor Login{% endblock %}

{% block content %}
<div id="loginModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
        <h2 class="text-2xl font-semibold text-center text-gray-800 mb-6">Login to Your Account</h2>
        <form method="POST" action="{% url 'agency:login' %}" class="space-y-6">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <div>
                <label class="block text-gray-700 mb-2 text-sm font-medium" for="{{ form.username.id_for_label }}">Username</label>
                <input type="text" name="username" id="{{ form.username.id_for_label }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-300">
                {{ form.username.errors }}
            </div>

            <div>
                <label class="block text-gray-700 mb-2 text-sm font-medium" for="{{ form.password.id_for_label }}">Password</label>
                <input type="password" name="password" id="{{ form.password.id_for_label }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-300">
                {{ form.password.errors }}
            </div>

            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 cursor-pointer">
                Login
            </button>

            <div class="text-center">
                <a href="{% url 'agency:signup' %}" class="text-blue-500 text-sm hover:underline">Signup</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
