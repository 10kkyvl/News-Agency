{% extends 'base.html' %}

{% block title %}{{ object|yesno:"Update,Create" }} Topic - NewsPortal{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
    <h2 class="text-2xl font-semibold text-center text-gray-800 mb-6">
      {{ object|yesno:"Update,Create new" }} Topic
    </h2>
    <form method="POST" class="space-y-6">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div>
        <label class="block text-gray-700 mb-2 text-sm font-medium" for="{{ form.name.id_for_label }}">
          Name
        </label>
        <input type="text"
               name="name"
               id="{{ form.name.id_for_label }}"
               value="{{ form.name.value|default:'' }}"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-300">
        <div class="text-red-500 text-sm mt-1">
          {{ form.name.errors }}
        </div>
      </div>
      <div class="flex space-x-4">
        <a href="{% url 'agency:newspaper-list' %}"
           class="w-full bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 cursor-pointer text-center">
          Cancel
        </a>
        <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 cursor-pointer">
          {{ object|yesno:"Update,Create" }}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
