<header class="bg-gray-900 shadow-sm">
  <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-white">NewsPortal</div>
    <div class="flex items-center space-x-4">
      {% if not user.is_authenticated %}
        <a href="{% url 'agency:login' %}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          Login
        </a>
      {% else %}
        <a href="{% url 'agency:newspaper-list' %}" class="text-white hover:underline mr-2">
          {{ user.username }}
        </a>
        <a href="{% url 'agency:logout' %}" class="text-red-500 hover:text-red-400 border border-red-500 px-3 py-1 rounded">
          Logout
        </a>
      {% endif %}
      <button class="md:hidden text-gray-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </nav>
</header>
